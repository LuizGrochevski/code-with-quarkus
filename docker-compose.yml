version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: telemetry-db
    environment:
      POSTGRES_USER: quarkus
      POSTGRES_PASSWORD: quarkus
      POSTGRES_DB: telemetry_db
    ports:
      - "5432:5432"

  kafka:
    image: apache/kafka:latest
    container_name: telemetry-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      # CONFIGURAÇÕES DE REPLICAÇÃO LOCAL (Adicione essas 2 linhas abaixo):
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      
  app-native:
    image: quarkus/vehicle-telemetry-native
    container_name: vehicle-telemetry-api
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_REACTIVE_URL: "postgresql://postgres:5432/telemetry_db"
      QUARKUS_DATASOURCE_USERNAME: "quarkus"
      QUARKUS_DATASOURCE_PASSWORD: "quarkus"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    depends_on:
      - postgres
      - kafka