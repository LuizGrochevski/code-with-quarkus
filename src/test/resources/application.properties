# Banco H2 em memória (substitui o PostgreSQL nos testes)
quarkus.datasource.db-kind=h2
quarkus.datasource.reactive.url=vertx-reactive:h2:mem:testdb
quarkus.hibernate-orm.database.generation=drop-and-create

# Desabilita a rota do Camel/Kafka durante os testes
camel.quarkus.routes-discovery.enabled=false

# Suprime logs de infraestrutura para saída mais limpa
quarkus.log.category."org.apache.kafka".level=OFF
quarkus.log.category."org.apache.camel".level=WARN
